<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pencatat Waktu">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
<title>⏱️ Pencatat Waktu Kejadian</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 16px;
    color: #333;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  h1 { text-align: center; color: #4a4a8e; margin-bottom: 5px; font-size: 1.4em; }
  .subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 20px; }

  /* ====== AUTH SCREEN ====== */
  .auth-box { padding: 10px 0; }
  .auth-tabs { display: flex; margin-bottom: 20px; background: #f0f0f5; border-radius: 10px; padding: 4px; }
  .auth-tab {
    flex: 1; padding: 10px; text-align: center; border: none; background: transparent;
    border-radius: 8px; cursor: pointer; font-weight: 600; color: #666; font-size: 0.95em;
  }
  .auth-tab.active { background: white; color: #667eea; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
  .auth-input {
    width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 1em; margin-bottom: 10px; font-family: inherit;
  }
  .auth-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
  .auth-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 10px; font-size: 1em; font-weight: bold;
    cursor: pointer; margin-top: 5px;
  }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-msg {
    padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9em; text-align: center;
  }
  .auth-msg.error { background: #fee; color: #c33; }
  .auth-msg.success { background: #efe; color: #3a3; }
  .auth-msg.info { background: #e3f2fd; color: #1565c0; }

  /* ====== APP SCREEN ====== */
  .user-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #f5f5ff; padding: 10px 14px; border-radius: 10px; margin-bottom: 15px;
    font-size: 0.85em;
  }
  .user-email { color: #667eea; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
  .logout-btn {
    background: transparent; border: 1px solid #ddd; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; color: #666; font-size: 0.85em;
  }
  .logout-btn:active { background: #fee; }

  .stats { display: flex; justify-content: space-around; background: #f5f5ff; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
  .stat-item { text-align: center; }
  .stat-value { font-size: 1.4em; font-weight: bold; color: #667eea; }
  .stat-label { font-size: 0.75em; color: #888; }

  .add-btn {
    width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 15px; font-size: 1.2em; font-weight: bold;
    cursor: pointer; box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled { opacity: 0.6; }

  .form-box {
    background: #f9f9ff; border: 2px dashed #667eea; border-radius: 15px;
    padding: 15px; margin-top: 15px; animation: slide 0.3s ease;
  }
  @keyframes slide { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
  .form-box .time-display {
    font-size: 1.6em; font-weight: bold; color: #764ba2; text-align: center;
    margin-bottom: 10px; font-family: "SF Mono", Consolas, monospace; letter-spacing: 2px;
  }
  .form-box input {
    width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 1em; margin-bottom: 10px; font-family: inherit;
  }
  .form-box input:focus { outline: none; border-color: #667eea; }
  .form-actions { display: flex; gap: 8px; }
  .form-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
  .btn-save { background: #4caf50; color: white; }
  .btn-cancel { background: #eee; color: #555; }

  .list { margin-top: 20px; }
  .item {
    background: #fafafa; border-left: 4px solid #667eea;
    padding: 12px 12px 12px 14px; border-radius: 10px; margin-bottom: 10px;
    position: relative; animation: slide 0.25s ease;
  }
  .item-time { font-family: "SF Mono", Consolas, monospace; font-size: 1.2em; font-weight: bold; color: #333; }
  .item-date { font-size: 0.75em; color: #999; }
  .item-note { color: #555; margin-top: 3px; word-break: break-word; }
  .item-gap {
    display: inline-block; background: #fff3cd; color: #856404;
    padding: 3px 10px; border-radius: 10px; font-size: 0.8em; margin-top: 6px; font-weight: 500;
  }
  .item-delete {
    position: absolute; top: 10px; right: 10px; background: #ff5252; color: white;
    border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 0.85em;
  }
  .clear-all {
    width: 100%; margin-top: 15px; padding: 12px; background: #fff; color: #ff5252;
    border: 1px solid #ff5252; border-radius: 10px; cursor: pointer; font-weight: bold;
  }
  .empty { text-align: center; color: #aaa; padding: 30px 10px; font-style: italic; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .spinner {
    display: inline-block; width: 30px; height: 30px;
    border: 3px solid #eee; border-top-color: #667eea; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.75em; margin-top: 20px; }
  .sync-badge {
    display: inline-block; background: rgba(255,255,255,0.2); padding: 3px 10px;
    border-radius: 10px; font-size: 0.7em; margin-left: 5px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>⏱️ Pencatat Waktu Kejadian</h1>
    <p class="subtitle">Tersinkron di cloud · Akses dari device manapun</p>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-box" style="display:none;">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Masuk</button>
        <button class="auth-tab" data-tab="register">Daftar</button>
      </div>

      <div id="loginForm">
        <input type="email" class="auth-input" id="loginEmail" placeholder="Email" autocomplete="email">
        <input type="password" class="auth-input" id="loginPassword" placeholder="Password" autocomplete="current-password">
        <button class="auth-btn" id="loginBtn">Masuk</button>
      </div>

      <div id="registerForm" style="display:none;">
        <input type="email" class="auth-input" id="regEmail" placeholder="Email" autocomplete="email">
        <input type="password" class="auth-input" id="regPassword" placeholder="Password (min. 6 karakter)" autocomplete="new-password">
        <button class="auth-btn" id="regBtn">Daftar</button>
        <div class="auth-msg info" style="margin-top:10px;">
          ⚠️ Setelah daftar, cek email Anda untuk verifikasi (jika diaktifkan).
        </div>
      </div>

      <div id="authMsg"></div>
    </div>

    <!-- APP SCREEN -->
    <div id="appScreen" style="display:none;">
      <div class="user-bar">
        <div class="user-email" id="userEmail">-</div>
        <button class="logout-btn" id="logoutBtn">Keluar</button>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="todayCount">0</div>
          <div class="stat-label">Hari Ini</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="avgGap">-</div>
          <div class="stat-label">Rata² Jeda</div>
        </div>
      </div>

      <button class="add-btn" id="addBtn">➕ Catat Kejadian</button>
      <div id="formArea"></div>
      <div class="list" id="list"></div>
      <button class="clear-all" id="clearBtn" style="display:none;">🗑️ Hapus Semua Data</button>
    </div>

    <!-- LOADING -->
    <div id="loadingScreen" class="loading">
      <div class="spinner"></div>
      <div style="margin-top:10px;">Memuat...</div>
    </div>
  </div>

  <div class="footer">
    ☁️ Data tersinkron di Supabase <span class="sync-badge">Cloud</span>
  </div>

<script>
// ============================================
// INIT SUPABASE
// ============================================
if (typeof supabase === 'undefined' || SUPABASE_URL.includes('XXXXX')) {
  document.body.innerHTML = `
    <div style="max-width:500px;margin:40px auto;background:white;padding:30px;border-radius:20px;text-align:center;">
      <h2 style="color:#c33;">⚠️ Konfigurasi Belum Lengkap</h2>
      <p style="margin-top:15px;color:#666;">Edit file <code>config.js</code> dan isi:<br>
      <b>SUPABASE_URL</b> dan <b>SUPABASE_ANON_KEY</b></p>
      <p style="margin-top:15px;font-size:0.85em;color:#999;">Lihat README.md untuk panduan lengkap.</p>
    </div>`;
  throw new Error('Supabase not configured');
}

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// STATE
// ============================================
let currentUser = null;
let data = [];
let formOpen = false;

const $ = id => document.getElementById(id);

// ============================================
// AUTH
// ============================================
function showAuthMsg(msg, type = 'error') {
  const el = $('authMsg');
  el.className = 'auth-msg ' + type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function doLogin(email, password) {
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'Memproses...';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  $('loginBtn').disabled = false;
  $('loginBtn').textContent = 'Masuk';
  if (error) { showAuthMsg('❌ ' + error.message); return; }
  onAuthSuccess(data.user);
}

async function doRegister(email, password) {
  if (password.length < 6) { showAuthMsg('❌ Password minimal 6 karakter'); return; }
  $('regBtn').disabled = true;
  $('regBtn').textContent = 'Memproses...';
  const { data, error } = await db.auth.signUp({ email, password });
  $('regBtn').disabled = false;
  $('regBtn').textContent = 'Daftar';
  if (error) { showAuthMsg('❌ ' + error.message); return; }

  if (data.user && data.session) {
    onAuthSuccess(data.user);
  } else {
    showAuthMsg('✅ Daftar berhasil! Cek email untuk verifikasi, lalu login.', 'success');
  }
}

async function doLogout() {
  if (!confirm('Keluar dari aplikasi?')) return;
  await db.auth.signOut();
  currentUser = null;
  data = [];
  showScreen('auth');
}

function onAuthSuccess(user) {
  currentUser = user;
  $('userEmail').textContent = user.email;
  showScreen('app');
  loadEvents();
}

function showScreen(name) {
  $('authScreen').style.display = name === 'auth' ? 'block' : 'none';
  $('appScreen').style.display = name === 'app' ? 'block' : 'none';
  $('loadingScreen').style.display = name === 'loading' ? 'block' : 'none';
}

// ============================================
// DATA OPERATIONS
// ============================================
async function loadEvents() {
  $('list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const { data: rows, error } = await db
    .from('events')
    .select('*')
    .order('ts', { ascending: true });

  if (error) {
    $('list').innerHTML = `<div class="empty">❌ Gagal memuat: ${error.message}</div>`;
    return;
  }
  data = rows || [];
  render();
}

async function addEvent(ts, note) {
  const { data: newRow, error } = await db
    .from('events')
    .insert({ user_id: currentUser.id, ts: ts, note: note })
    .select()
    .single();

  if (error) { alert('Gagal menyimpan: ' + error.message); return false; }
  data.push(newRow);
  data.sort((a, b) => a.ts - b.ts);
  return true;
}

async function deleteEvent(id) {
  const { error } = await db.from('events').delete().eq('id', id);
  if (error) { alert('Gagal menghapus: ' + error.message); return; }
  data = data.filter(x => x.id !== id);
  render();
}

async function deleteAll() {
  const { error } = await db.from('events').delete().eq('user_id', currentUser.id);
  if (error) { alert('Gagal menghapus: ' + error.message); return; }
  data = [];
  render();
}

// ============================================
// RENDER
// ============================================
function pad(n) { return String(n).padStart(2, '0'); }
function formatTime(ts) {
  const d = new Date(ts);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function formatDate(ts) {
  const d = new Date(ts);
  const hari = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()} · ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatGap(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}j ${m}m ${s}d`;
  if (m > 0) return `${m}m ${s}d`;
  return `${s}d`;
}
function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.toDateString() === n.toDateString();
}
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function render() {
  $('totalCount').textContent = data.length;
  $('todayCount').textContent = data.filter(x => isToday(x.ts)).length;

  if (data.length >= 2) {
    let totalGap = 0;
    for (let i = 1; i < data.length; i++) {
      totalGap += data[i].ts - data[i-1].ts;
    }
    $('avgGap').textContent = formatGap(totalGap / (data.length - 1));
  } else {
    $('avgGap').textContent = '-';
  }

  const list = $('list');
  list.innerHTML = '';
  if (data.length === 0) {
    list.innerHTML = '<div class="empty">Belum ada catatan.<br>Tekan ➕ untuk mulai.</div>';
    $('clearBtn').style.display = 'none';
    return;
  }
  $('clearBtn').style.display = 'block';

  const sorted = [...data].sort((a,b) => b.ts - a.ts);
  sorted.forEach(item => {
    const realIdx = data.findIndex(x => x.id === item.id);
    const prev = realIdx > 0 ? data[realIdx - 1] : null;
    const gap = prev ? (item.ts - prev.ts) : null;

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <button class="item-delete" data-id="${item.id}" aria-label="Hapus">✕</button>
      <div class="item-time">${formatTime(item.ts)}</div>
      <div class="item-date">${formatDate(item.ts)}</div>
      <div class="item-note">${escapeHtml(item.note) || '<em style="color:#bbb">(tanpa keterangan)</em>'}</div>
      ${gap !== null ? `<span class="item-gap">⏳ Tahan: ${formatGap(gap)}</span>` : '<span class="item-gap" style="background:#e3f2fd;color:#1565c0">📍 Catatan pertama</span>'}
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('.item-delete').forEach(btn => {
    btn.onclick = () => {
      if (confirm('Hapus catatan ini?')) deleteEvent(btn.dataset.id);
    };
  });
}

function openForm() {
  if (formOpen) return;
  formOpen = true;
  const area = $('formArea');
  area.innerHTML = `
    <div class="form-box">
      <div class="time-display" id="liveTime">--:--:--</div>
      <input type="text" id="noteInput" placeholder="Keterangan (mis: waktu kencing)" maxlength="200" autocomplete="off">
      <div class="form-actions">
        <button class="btn-cancel" id="cancelBtn">Batal</button>
        <button class="btn-save" id="saveBtn">💾 Simpan</button>
      </div>
    </div>
  `;
  $('noteInput').focus();

  const timer = setInterval(() => {
    const el = $('liveTime');
    if (!el) { clearInterval(timer); return; }
    el.textContent = formatTime(Date.now());
  }, 1000);
  $('liveTime').textContent = formatTime(Date.now());

  const closeForm = () => {
    clearInterval(timer);
    $('formArea').innerHTML = '';
    formOpen = false;
  };

  $('cancelBtn').onclick = closeForm;
  $('saveBtn').onclick = async () => {
    const note = $('noteInput').value.trim();
    $('saveBtn').disabled = true;
    $('saveBtn').textContent = 'Menyimpan...';
    const ok = await addEvent(Date.now(), note);
    if (ok) {
      closeForm();
      render();
    } else {
      $('saveBtn').disabled = false;
      $('saveBtn').textContent = '💾 Simpan';
    }
  };

  $('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('saveBtn').click();
    if (e.key === 'Escape') $('cancelBtn').click();
  });
}

// ============================================
// EVENT LISTENERS
// ============================================
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isLogin = tab.dataset.tab === 'login';
    $('loginForm').style.display = isLogin ? 'block' : 'none';
    $('registerForm').style.display = isLogin ? 'none' : 'block';
    $('authMsg').style.display = 'none';
  };
});

$('loginBtn').onclick = () => {
  const email = $('loginEmail').value.trim();
  const pw = $('loginPassword').value;
  if (!email || !pw) { showAuthMsg('❌ Email dan password wajib diisi'); return; }
  doLogin(email, pw);
};

$('regBtn').onclick = () => {
  const email = $('regEmail').value.trim();
  const pw = $('regPassword').value;
  if (!email || !pw) { showAuthMsg('❌ Email dan password wajib diisi'); return; }
  doRegister(email, pw);
};

$('logoutBtn').onclick = doLogout;
$('addBtn').onclick = openForm;
$('clearBtn').onclick = () => {
  if (confirm('Yakin hapus SEMUA data? Tindakan ini tidak bisa dibatalkan.')) {
    deleteAll();
  }
};

// Enter di input login/register
['loginEmail','loginPassword'].forEach(id => {
  $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); });
});
['regEmail','regPassword'].forEach(id => {
  $(id).addEventListener('keydown', e => { if (e.key === 'Enter') $('regBtn').click(); });
});

// ============================================
// INIT: CEK SESSION
// ============================================
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    onAuthSuccess(session.user);
  } else {
    showScreen('auth');
  }

  // Listen auth changes (auto-login kalau session masih valid)
  db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      onAuthSuccess(session.user);
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      data = [];
      showScreen('auth');
    }
  });
})();
</script>
</body>
</html>
