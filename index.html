<!DOCTYPE html> 
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pencatat Waktu">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
<title>⏱️ Pencatat Waktu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100dvh; padding: 16px; color: #333;
  }
  .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  h1 { text-align: center; color: #4a4a8e; margin-bottom: 5px; font-size: 1.4em; }
  .subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 20px; }
  
  .stats { display: flex; justify-content: space-around; background: #f5f5ff; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
  .stat-item { text-align: center; }
  .stat-value { font-size: 1.4em; font-weight: bold; color: #667eea; }
  .stat-label { font-size: 0.75em; color: #888; }

  .add-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled { opacity: 0.6; }

  .form-box { background: #f9f9ff; border: 2px dashed #667eea; border-radius: 15px; padding: 15px; margin-top: 15px; animation: slide 0.3s ease; }
  @keyframes slide { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
  .time-display { font-size: 1.6em; font-weight: bold; color: #764ba2; text-align: center; margin-bottom: 10px; font-family: monospace; letter-spacing: 2px; }
  .form-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; margin-bottom: 10px; }
  .form-actions { display: flex; gap: 8px; }
  .form-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn-save { background: #4caf50; color: white; }
  .btn-cancel { background: #eee; color: #555; }

  .list { margin-top: 20px; }
  .item { background: #fafafa; border-left: 4px solid #667eea; padding: 12px; border-radius: 10px; margin-bottom: 10px; position: relative; animation: slide 0.25s ease; }
  .item-time { font-family: monospace; font-size: 1.2em; font-weight: bold; color: #333; }
  .item-date { font-size: 0.75em; color: #999; }
  .item-note { color: #555; margin-top: 3px; word-break: break-word; }
  .item-gap { display: inline-block; background: #fff3cd; color: #856404; padding: 3px 10px; border-radius: 10px; font-size: 0.8em; margin-top: 6px; font-weight: 500; }
  .item-delete { position: absolute; top: 10px; right: 10px; background: #ff5252; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
  .clear-all { width: 100%; margin-top: 15px; padding: 12px; background: #fff; color: #ff5252; border: 1px solid #ff5252; border-radius: 10px; cursor: pointer; font-weight: bold; }
  .empty { text-align: center; color: #aaa; padding: 30px 10px; font-style: italic; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #eee; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.75em; margin-top: 20px; }
</style>
</head>
<body>
  <div class="container">
    <h1>⏱️ Pencatat Waktu</h1>
    <p class="subtitle">Tersimpan di Google Sheets Anda</p>

    <div class="stats">
      <div class="stat-item"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total</div></div>
      <div class="stat-item"><div class="stat-value" id="todayCount">0</div><div class="stat-label">Hari Ini</div></div>
      <div class="stat-item"><div class="stat-value" id="avgGap">-</div><div class="stat-label">Rata² Jeda</div></div>
    </div>

    <button class="add-btn" id="addBtn">➕ Catat Kejadian</button>
    <div id="formArea"></div>
    <div class="list" id="list"></div>
    <button class="clear-all" id="clearBtn" style="display:none;">🗑️ Hapus Semua Data</button>
  </div>
  <div class="footer">☁️ Backend: Google Sheets</div>

<script>
// ==========================================
// KONFIGURASI GOOGLE SHEETS API
// ==========================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzmBznY8daOeeFZHFd7IwPG9Uwb98ZzOFIIBzd5zASMf_vXwSzF3uITLsJhxm95NjIj/exec'; // Ganti dengan URL Web App dari Langkah 3B
const SECRET_KEY = 'kuncirahasia123'; // Harus SAMA dengan yang di Apps Script

let data = [];
let formOpen = false;
const $ = id => document.getElementById(id);

// ==========================================
// FUNGSI API
// ==========================================
async function loadData() {
  $('list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API_URL}?key=${SECRET_KEY}`);
    const json = await res.json();
    if (json.success) {
      data = json.data;
      render();
    } else {
      $('list').innerHTML = `<div class="empty">❌ Gagal: ${json.error}</div>`;
    }
  } catch (e) {
    $('list').innerHTML = '<div class="empty">❌ Gagal koneksi ke Google Sheets</div>';
  }
}

async function addData(ts, note) {
  const id = Date.now() + '-' + Math.random().toString(36).slice(2,7);
  try {
    // Gunakan text/plain untuk menghindari CORS preflight di Google Apps Script
    const res = await fetch(`${API_URL}?key=${SECRET_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'add', id, ts, note })
    });
    const json = await res.json();
    if (json.success) {
      data.unshift({ id, ts, note }); // Tambah ke awal array
      render();
      return true;
    }
  } catch (e) { alert('Gagal menyimpan'); }
  return false;
}

async function deleteData(id) {
  try {
    const res = await fetch(`${API_URL}?key=${SECRET_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'delete', id })
    });
    const json = await res.json();
    if (json.success) {
      data = data.filter(x => x.id !== id);
      render();
    }
  } catch (e) { alert('Gagal menghapus'); }
}

async function clearAllData() {
  if (!confirm('Yakin hapus SEMUA data di Google Sheet?')) return;
  try {
    const res = await fetch(`${API_URL}?key=${SECRET_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'clear' })
    });
    const json = await res.json();
    if (json.success) {
      data = [];
      render();
    }
  } catch (e) { alert('Gagal menghapus semua'); }
}

// ==========================================
// RENDER & UTILS
// ==========================================
function pad(n) { return String(n).padStart(2, '0'); }
function formatTime(ts) {
  const d = new Date(Number(ts));
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function formatDate(ts) {
  const d = new Date(Number(ts));
  const hari = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
}
function formatGap(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}j ${m}m ${s}d`;
  if (m > 0) return `${m}m ${s}d`;
  return `${s}d`;
}
function isToday(ts) {
  return new Date(Number(ts)).toDateString() === new Date().toDateString();
}
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function render() {
  $('totalCount').textContent = data.length;
  $('todayCount').textContent = data.filter(x => isToday(x.ts)).length;

  if (data.length >= 2) {
    let totalGap = 0;
    for (let i = 1; i < data.length; i++) {
      totalGap += Math.abs(data[i].ts - data[i-1].ts);
    }
    $('avgGap').textContent = formatGap(totalGap / (data.length - 1));
  } else {
    $('avgGap').textContent = '-';
  }

  const list = $('list');
  list.innerHTML = '';
  if (data.length === 0) {
    list.innerHTML = '<div class="empty">Belum ada catatan.<br>Tekan ➕ untuk mulai.</div>';
    $('clearBtn').style.display = 'none';
    return;
  }
  $('clearBtn').style.display = 'block';

  data.forEach((item, idx) => {
    const nextItem = data[idx + 1]; // Karena sudah diurutkan terbaru di atas, idx+1 adalah catatan sebelumnya
    const gap = nextItem ? (item.ts - nextItem.ts) : null;

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <button class="item-delete" data-id="${item.id}">✕</button>
      <div class="item-time">${formatTime(item.ts)}</div>
      <div class="item-date">${formatDate(item.ts)}</div>
      <div class="item-note">${escapeHtml(item.note) || '<em style="color:#bbb">(tanpa keterangan)</em>'}</div>
      ${gap !== null ? `<span class="item-gap">⏳ Tahan: ${formatGap(gap)}</span>` : '<span class="item-gap" style="background:#e3f2fd;color:#1565c0">📍 Catatan pertama</span>'}
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('.item-delete').forEach(btn => {
    btn.onclick = () => { if (confirm('Hapus?')) deleteData(btn.dataset.id); };
  });
}

function openForm() {
  if (formOpen) return;
  formOpen = true;
  $('formArea').innerHTML = `
    <div class="form-box">
      <div class="time-display" id="liveTime">--:--:--</div>
      <input type="text" id="noteInput" placeholder="Keterangan (mis: waktu kencing)" maxlength="200" autocomplete="off">
      <div class="form-actions">
        <button class="btn-cancel" id="cancelBtn">Batal</button>
        <button class="btn-save" id="saveBtn">💾 Simpan</button>
      </div>
    </div>
  `;
  $('noteInput').focus();

  const timer = setInterval(() => {
    const el = $('liveTime');
    if (!el) { clearInterval(timer); return; }
    el.textContent = formatTime(Date.now());
  }, 1000);
  $('liveTime').textContent = formatTime(Date.now());

  const closeForm = () => { clearInterval(timer); $('formArea').innerHTML = ''; formOpen = false; };
  $('cancelBtn').onclick = closeForm;
  
  $('saveBtn').onclick = async () => {
    const note = $('noteInput').value.trim();
    $('saveBtn').disabled = true;
    $('saveBtn').textContent = 'Menyimpan...';
    const ok = await addData(Date.now(), note);
    if (ok) closeForm();
    else { $('saveBtn').disabled = false; $('saveBtn').textContent = '💾 Simpan'; }
  };

  $('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('saveBtn').click();
    if (e.key === 'Escape') $('cancelBtn').click();
  });
}

// Init
$('addBtn').onclick = openForm;
$('clearBtn').onclick = clearAllData;
loadData();
</script>
</body>
</html>
